name: Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # Run tests on template repository to validate template integrity
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio httpx
        
    - name: Run tests with pytest
      run: |
        echo "🧪 Running tests with Python ${{ matrix.python-version }}"
        pytest tests/ -v --tb=short
        
    - name: Run tests with coverage
      run: |
        echo "📊 Running tests with coverage report"
        pytest tests/ --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      if: matrix.python-version == '3.10'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: true
        
    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v3
      if: matrix.python-version == '3.10'
      with:
        name: coverage-report
        path: htmlcov/
        
  integration-test:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx
        
    - name: Start test server
      run: |
        echo "🚀 Starting test server..."
        uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        sleep 5
        
    - name: Wait for server to be ready
      run: |
        echo "⏳ Waiting for server to be ready..."
        timeout 30 bash -c 'until curl -f http://localhost:8000/health; do sleep 1; done'
        
    - name: Run integration tests
      run: |
        echo "🔗 Running integration tests..."
        pytest tests/ -k "test_api" -v --tb=short
        
    - name: Test API endpoints
      run: |
        echo "🧪 Testing API endpoints..."
        
        # Test health endpoint
        curl -f http://localhost:8000/health
        echo "✅ Health endpoint working"
        
        # Test root endpoint
        curl -f http://localhost:8000/
        echo "✅ Root endpoint working"
        
        # Test process endpoint
        curl -X POST http://localhost:8000/process \
          -H "Content-Type: application/json" \
          -d '{"text": "Hello, world!"}'
        echo "✅ Process endpoint working"
        
    - name: Stop test server
      run: |
        echo "🛑 Stopping test server..."
        pkill -f uvicorn || true
        
  docker-test:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: |
        echo "🐳 Building Docker image..."
        docker build -t ai-app-template:test .
        
    - name: Test Docker container
      run: |
        echo "🧪 Testing Docker container..."
        docker run -d --name test-container -p 8000:8000 ai-app-template:test
        sleep 10
        
        # Test if container is running
        docker ps | grep test-container
        echo "✅ Container is running"
        
        # Test health endpoint
        curl -f http://localhost:8000/health
        echo "✅ Docker container health check passed"
        
        # Stop container
        docker stop test-container
        docker rm test-container