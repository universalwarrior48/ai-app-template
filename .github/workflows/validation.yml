name: Code Quality & Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest
    # Skip for template repository to avoid unnecessary runs
    if: github.repository != 'universalwarrior48/ai-app-template'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black flake8 mypy bandit safety
        
    - name: Run Black code formatting check
      run: |
        echo "🔍 Checking code formatting with Black..."
        black --check --diff app/ tests/
        
    - name: Run Flake8 linting
      run: |
        echo "🔍 Running Flake8 linting..."
        flake8 app/ tests/ --max-line-length=88 --extend-ignore=E203,W503
        
    - name: Run MyPy type checking
      run: |
        echo "🔍 Running MyPy type checking..."
        mypy app/ --ignore-missing-imports
        
    - name: Run Bandit security scan
      run: |
        echo "🔍 Running Bandit security scan..."
        bandit -r app/ -f json -o bandit-report.json || true
        bandit -r app/ || true
        
    - name: Check dependencies for security vulnerabilities
      run: |
        echo "🔍 Checking dependencies for security vulnerabilities..."
        safety check --json --output safety-report.json || true
        safety check || true
        
    - name: Validate requirements.txt
      run: |
        echo "🔍 Validating requirements.txt..."
        if [ ! -f "requirements.txt" ]; then
          echo "❌ requirements.txt not found"
          exit 1
        fi
        
        # Check for pinned versions
        echo "Checking for pinned versions..."
        if grep -q "==" requirements.txt; then
          echo "✅ Found pinned versions in requirements.txt"
        else
          echo "⚠️  Warning: No pinned versions found in requirements.txt"
        fi
        
    - name: Validate project structure
      run: |
        echo "🔍 Validating project structure..."
        
        # Check essential files
        essential_files=("app/main.py" "app/api/routes.py" "app/core/config.py" "README.md" ".env")
        for file in "${essential_files[@]}"; do
          if [ -f "$file" ]; then
            echo "✅ Found $file"
          else
            echo "❌ Missing essential file: $file"
            exit 1
          fi
        done
        
        # Check directory structure
        directories=("app" "app/api" "app/core" "app/models" "app/services" "app/ui" "tests")
        for dir in "${directories[@]}"; do
          if [ -d "$dir" ]; then
            echo "✅ Found directory $dir"
          else
            echo "❌ Missing directory: $dir"
            exit 1
          fi
        done
        
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json